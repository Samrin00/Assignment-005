 <!DOCTYPE html> 
 <html lang="en">
   <head> <meta charset="UTF-8"/> 
    <meta name="viewport" content="width=device-width,
     initial-scale=1.0"/> 
     <title>Assignment-005</title> 
     <script src="https://cdn.tailwindcss.com"></script>
 <script> tailwind.config = { theme: { extend: { colors: 
  { brand: '#4f46e5', 'brand-hover': '#4338ca', } 
} 
  } } </script> 
  </head> 
  <body class="min-h-screen bg-gray-50 flex items-center justify-center font-sans"> 
    <div class="bg-white border border-gray-200 rounded-2xl shadow-lg p-12 w-full max-w-md"> 
     
 <!-- Header --> 
  <div class="flex flex-col items-center mb-9"> 
    <img src="assets/github-logo.png" alt="GitHub" class="w-20 h-20 rounded-full mb-4"/> 
    <h1 class="text-2xl font-bold text-gray-900">GitHub Issues Tracker</h1> 
    <p class="text-sm text-gray-500 mt-1">Sign in to manage your issues</p> 
  </div>
  
  <!-- Error --> 
  <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 text-sm mb-4"> Invalid username or password. Try admin / admin123. </div> <!-- Username --> <div class="mb-5"> <label class="block text-sm font-semibold text-gray-900 mb-2">Username</label> <input id="username" 
    type="text" placeholder="Enter Username" 
    class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm text-gray-900 placeholder-gray-400 outline-none
     focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition"/>
   <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
   </div> 
   
   <!-- Password --> 
    <div class="mb-6"> 
    <label class="block text-sm font-semibold text-gray-900 mb-2">Password</label> 
    <input id="password" type="password" 
    placeholder="Enter Password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm text-gray-900 placeholder-gray-400 
    outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition"/> 
    <p class="text-xs text-indigo-600 mt-1">Default: admin123</p> 
  </div> 
  
  <!-- Sign In Button --> 
   <button onclick="login()" 
   class="w-full py-3 bg-indigo-600 
   hover:bg-indigo-700 text-white font-semibold text-base rounded-xl transition cursor-pointer 
   mt-1"> Sign In </button>
   <div class="flex items-center gap-3 my-6 text-xs text-gray-400">
  <div class="flex-1 h-px bg-gray-200">
  </div> OR <div class="flex-1 h-px bg-gray-200"></div>
 </div> <div class="bg-gray-50 rounded-xl px-5 py-4 text-center"> 
  <p class="text-xs text-gray-500 mb-2">Demo Credentials:</p> 
  <br> <p class="text-sm text-gray-800"> 
  <strong class="font-semibold">Username:</strong> admin <br> 
  <strong class="font-semibold">Password:</strong> admin123 </p> 
</div> </div> <script src="script.js"></script>
 
</body> 
 </html>
